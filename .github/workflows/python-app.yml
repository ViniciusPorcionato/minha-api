name: CI/CD LAB9 - Homologacao e Producao

env:
  IMAGE_NAME: viniciusporcionato/senai_fastapi

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Build e testes (roda em qualquer push) ─────────────────
  Build:
    name: Build e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Executar testes com pytest
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  # ── Build e push da imagem Docker ──────────────────────────
  Imagem:
    name: Build e Push da Imagem Docker
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Deploy em Homologação (automático — só na branch develop)
  Deploy_Homologacao:
    name: Deploy Homologacao (EC2 senai-fastapi-homol)
    runs-on: ubuntu-latest
    needs: Imagem
    if: github.ref == 'refs/heads/develop'
    environment: homologacao
    steps:
      - name: Deploy via SSH na EC2 HOMOL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop senai_fastapi 2>/dev/null || true
            docker rm senai_fastapi 2>/dev/null || true
            docker run -d \
              --name senai_fastapi \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ env.IMAGE_NAME }}:latest
            sleep 5
            curl -f http://localhost:8080/health || exit 1
            echo "HOMOL: Deploy concluido!"
            docker image prune -f

  # ── Deploy em Produção (aprovação manual — só na branch main)
  Deploy_Producao:
    name: Deploy Producao (EC2 senai-fastapi-prd)
    runs-on: ubuntu-latest
    needs: Imagem
    if: github.ref == 'refs/heads/main'
    environment: producao
    steps:
      - name: Deploy via SSH na EC2 PRD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PRD }}
          username: ${{ secrets.EC2_USERNAME_PRD }}
          key: ${{ secrets.EC2_SSH_KEY_PRD }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop senai_fastapi 2>/dev/null || true
            docker rm senai_fastapi 2>/dev/null || true
            docker run -d \
              --name senai_fastapi \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ env.IMAGE_NAME }}:latest
            sleep 5
            curl -f http://localhost:8080/health || exit 1
            echo "PRD: Deploy concluido com sucesso!"
            docker image prune -f